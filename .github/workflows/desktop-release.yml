name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test suite
        run: bun test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_id: darwin-arm64
            runner: macos-14
          - target_id: linux-x64
            runner: ubuntu-latest
          - target_id: win32-x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/version: '0.1.0'/version: '${VERSION}'/" electrobun.config.ts
          rm -f electrobun.config.ts.bak
          echo "Injected version: ${VERSION}"
      - name: Prepare bundled upscaling binary
        run: bun run release:prepare-assets ${{ matrix.target_id }}
        env:
          UPSCAYL_BIN_URL_DARWIN_ARM64: ${{ vars.UPSCAYL_BIN_URL_DARWIN_ARM64 }}
          UPSCAYL_BIN_URL_LINUX_X64: ${{ vars.UPSCAYL_BIN_URL_LINUX_X64 }}
          UPSCAYL_BIN_URL_WIN32_X64: ${{ vars.UPSCAYL_BIN_URL_WIN32_X64 }}
      - name: Validate bundled upscaling assets
        run: bun run release:validate-assets ${{ matrix.target_id }}
      - name: Build web renderer
        run: bun run build
      - name: Build desktop app
        run: bunx electrobun build
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
      - name: List build output
        if: always()
        shell: bash
        run: |
          echo "=== artifacts/ ==="
          ls -la artifacts/ 2>/dev/null || echo "artifacts/ not found"
          echo "=== build/ ==="
          ls -la build/ 2>/dev/null || echo "build/ not found"
      - name: Upload Electrobun build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.target_id }}
          path: artifacts/
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          merge-multiple: true
          path: release-artifacts
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
