name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test suite
        run: bun vitest run

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_id: darwin-arm64
            runner: macos-14
            archive_ext: tar.gz
          - target_id: linux-x64
            runner: ubuntu-latest
            archive_ext: tar.gz
          - target_id: win32-x64
            runner: windows-latest
            archive_ext: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Prepare bundled upscaling binary
        run: bun run release:prepare-assets ${{ matrix.target_id }}
        env:
          UPSCAYL_BIN_URL_DARWIN_ARM64: ${{ vars.UPSCAYL_BIN_URL_DARWIN_ARM64 }}
          UPSCAYL_BIN_URL_LINUX_X64: ${{ vars.UPSCAYL_BIN_URL_LINUX_X64 }}
          UPSCAYL_BIN_URL_WIN32_X64: ${{ vars.UPSCAYL_BIN_URL_WIN32_X64 }}
      - name: Validate bundled upscaling assets
        run: bun run release:validate-assets ${{ matrix.target_id }}
      - name: Build desktop app
        run: bun run desktop:build
      - name: Resolve archive name
        id: archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          NAME="$(bun run release:archive-name "$VERSION" "${{ matrix.target_id }}")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: Package tar.gz release artifact
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p release-artifacts
          tar -czf "release-artifacts/${{ steps.archive.outputs.name }}" -C build .
      - name: Package zip release artifact
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Compress-Archive -Path build\* -DestinationPath "release-artifacts/${{ steps.archive.outputs.name }}" -Force
      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.target_id }}
          path: release-artifacts/${{ steps.archive.outputs.name }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          merge-multiple: true
          path: release-artifacts
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
