name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test suite
        run: bun test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_id: darwin-arm64
            runner: macos-14
          - target_id: linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -i.bak "s/version: '0.1.0'/version: '${VERSION}'/" electrobun.config.ts
          rm -f electrobun.config.ts.bak
          echo "Injected version: ${VERSION}"
      - name: Build web renderer
        run: bun run build
      - name: Dereference symlinks in tar (Linux)
        if: runner.os == 'Linux'
        run: |
          # Electrobun's Zig-based self-extractor doesn't support symlinks in
          # tar archives (TarUnsupportedFileType). Wrap tar so that create
          # operations automatically dereference symlinks.
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/tar" << 'WRAPPER'
          #!/bin/bash
          case "$1" in -*c*) exec /usr/bin/tar -h --hard-dereference "$@" ;; esac
          exec /usr/bin/tar "$@"
          WRAPPER
          chmod +x "$HOME/.local/bin/tar"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build desktop app
        run: bunx electrobun build --env=stable
      - name: List build output
        if: always()
        shell: bash
        run: |
          echo "=== artifacts/ ==="
          ls -la artifacts/ 2>/dev/null || echo "artifacts/ not found"
          echo "=== build/ ==="
          ls -la build/ 2>/dev/null || echo "build/ not found"
      - name: Upload Electrobun build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.target_id }}
          path: artifacts/
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          merge-multiple: true
          path: release-artifacts
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
